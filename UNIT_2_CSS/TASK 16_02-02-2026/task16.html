<!DOCTYPE html>
<html>
<head>
<title>CSS BASICS</title>
<link rel="stylesheet" href="task16.css">
</head>

<body>

<h1>CSS Grid - Part 2</h1>

<div class="grid-layout">
    <div class="header">Header</div>
    <div class="menu">Menu</div>
    <div class="content">Content</div>
    <div class="footer">Footer</div>
</div>

<h2>Auto Fit Example</h2>
<div class="grid-autofit">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
</div>

<h2>Auto Fill Example</h2>
<div class="grid-autofill">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
</div>

</body>
</html>
